<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoro's Wallpapers</title>

    <link rel="stylesheet" href="css/style1.css">
</head>

<body>

    <!-- ==========================================
         Hero Heading
    =========================================== -->

    <header class="hero">

        <h1>Totoro Wallpaper Collections</h1>

        <p>
            Download high-quality wallpapers for Desktop and Mobile.
        </p>

    </header>

    <div class="gallery">

        <!-- Wallpapers -->

    </div>

    <!-- ==========================================
         Wallpaper Gallery
    =========================================== -->

    <main class="gallery">

        <!-- Wallpaper Card -->

        <div class="wallpaper">
            <img src="images/wall1.png" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall1.png">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall2.jpeg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall2.jpeg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall4.jpeg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall4.jpeg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall5.jpeg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall5.jpeg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall6.jpeg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall6.jpeg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall7.jpg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall7.jpg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall8.jpg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall8.jpg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall9.jpg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall9.jpg">

                Download

            </button>
        </div>

        <div class="wallpaper">
            <img src="images/wall10.jpeg" alt="Wallpaper">

            <button class="download-btn" data-image="images/wall10.jpeg">

                Download

            </button>
        </div>

    </main>

    <!-- ==========================================
         Image preview
    =========================================== -->

    <div class="image-preview" id="imagePreview">

        <img id="previewImage" src="" alt="Preview">

    </div>

    <div class="popup" id="popup">
        Download Started
    </div>

    <!-- ==========================================
         Floating Bottom Bar
    =========================================== -->

    <div class="floating-bar">

        Totoro Wallpaper Collections

    </div>

    <!-- ==========================================
         Download Popup
    =========================================== -->

    <div class="popup" id="popup">

        Thank's for Downloading :)

    </div>

    <script src="js/script.js"></script>

</body>

</html>
