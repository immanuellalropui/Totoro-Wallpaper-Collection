<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoro's Wallpapers</title>

    <link rel="stylesheet" href="css/style1.css?v=2">
</head>

<body>

    <!-- ==========================================
         Hero Heading
    =========================================== -->

    <header class="hero">

        <h1>Totoro Vault</h1>

        <p>
            A personal collection of wallpapers by Totoro
        </p>

    </header>

    <div class="gallery">

        <!-- Wallpapers -->

    </div>

    <!-- ==========================================
         Wallpaper Gallery
    =========================================== -->

    <main class="gallery">

        <!-- Wallpaper Card -->

        <div class="wallpaper">
            <img src="images/wall1.jpg" alt="Wallpaper" data-title="Miku Chinese Dress" data-tags="anime">

        </div>

        <div class="wallpaper">
            <img src="images/wall2.jpeg" alt="Wallpaper" data-title="Shigeo" data-tags="anime">
        </div>

        <div class="wallpaper">
            <img src="images/wall11.png" alt="Wallpaper" data-title="Miku" data-tags="anime">
        </div>

        <div class="wallpaper">
            <img src="images/wall13.png" alt="Wallpaper" data-title="Ryo Yamada" data-tags="anime">
        </div>

        <div class="wallpaper">
            <img src="images/wall14.jpg" alt="Wallpaper" data-title="Nature Art" data-tags="nature">

        </div>

        <div class="wallpaper">
            <img src="images/wall3.jpeg" alt="Wallpaper" data-title="Restaurent" data-tags="nature">

        </div>

        <div class="wallpaper">
            <img src="images/wall4.jpeg" alt="Wallpaper" data-title="Aizawl City" data-tags="city">

        </div>

        <div class="wallpaper">
            <img src="images/wall12.png" alt="Wallpaper" data-title="Ryo Yamada" data-tags="anime">

        </div>


        <div class="wallpaper">
            <img src="images/wall16.jpg" alt="Wallpaper" data-title="Ryo Yamada" data-tags="anime">

        </div>

        <div class="wallpaper">
            <img src="images/wall15.png" alt="Wallpaper" data-title="Ryo Yamada" data-tags="anime">

        </div>

        <div class="wallpaper">
            <img src="images/wall17.jpg" alt="Wallpaper" data-title="Nature Art" data-tags="nature">

        </div>



        <div class="wallpaper">
            <img src="images/wall18.jpg" alt="Wallpaper" data-title="Ryo Yamada" data-tags="anime">

        </div>

        <div class="wallpaper">
            <img src="images/wall5.jpeg" alt="Wallpaper" data-title="Travelling" data-tags="tech">

        </div>

        <div class="wallpaper">
            <img src="images/wall6.jpeg" alt="Wallpaper" data-title="Tumjang" data-tags="nature">

        </div>


        <div class="wallpaper">
            <img src="images/wall7.jpg" alt="Wallpaper" data-title="Tumjang" data-tags="nature">

        </div>


        <div class="wallpaper">
            <img src="images/wall8.jpg" alt="Wallpaper" data-title="Minimal Desk Setup" data-tags="tech">

        </div>

        <div class="wallpaper">
            <img src="images/wall9.jpg" alt="Wallpaper" data-title="Deep Nap" data-tags="human">

        </div>

        <div class="wallpaper">
            <img src="images/wall10.jpeg" alt="Wallpaper" data-title="Haflong lake" data-tags="nature">

        </div>


    </main>

    <!-- ==========================================
         Image preview
    =========================================== -->

    <div class="image-preview" id="imagePreview">

        <div class="preview-content">

            <img id="previewImage" src="" alt="Preview">

            <h3 id="previewTitle"></h3>

            <button id="previewDownload">
                ⬇ Download Wallpaper
            </button>

        </div>

    </div>

    <!-- ==========================================
         Floating Bottom Bar
    =========================================== -->

    <div class="floating-bar" id="floatingBar">

        <div class="bar-title">
            🏷️ Collections
        </div>

        <div class="tag-list">

            <button class="tag active" data-tag="all">All</button>

            <button class="tag" data-tag="anime">Anime</button>

            <button class="tag" data-tag="nature">Nature</button>

            <button class="tag" data-tag="tech">Tech</button>

            <button class="tag" data-tag="city">City</button>

        </div>

    </div>

    <!-- ==========================================
         Download Popup
    =========================================== -->

    <div class="popup" id="popup">

        Thank's for Downloading :)

    </div>

    <script src="js/script.js"></script>

</body>

</html>
